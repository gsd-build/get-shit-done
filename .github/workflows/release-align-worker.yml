name: Release Align Worker
on:
  schedule:
    - cron: "17 * * * *"
  workflow_run:
    workflows:
      - Upstream Sync Worker
    types:
      - completed
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional: align to this upstream release tag (blank = latest)"
        required: false
        default: ""

concurrency:
  group: release-align-worker
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  UPSTREAM_REPO: gsd-build/get-shit-done
  BASE_BRANCH: main
  EXEMPTIONS_FILE: scripts/guard-exemptions.txt
  PROMPTS_DIR: .github/prompts
  REPAIR_WORKFLOW: upstream-sync-repair-agent.yml
  MIRROR_WORKFLOW: release-mirror-worker.yml

jobs:
  align:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fork repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve upstream release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IN_TAG="${{ inputs.upstream_tag }}"
          if [ -n "$IN_TAG" ]; then
            UP_TAG="$IN_TAG"
          else
            UP_TAG=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name // empty' 2>/dev/null || true)
          fi
          if [ -z "$UP_TAG" ]; then
            echo "No upstream release tag found; exiting."
            echo "upstream_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "upstream_tag=$UP_TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream release tag: $UP_TAG"

      - name: Verify fork main is fully synced with upstream main
        id: sync
        if: steps.tag.outputs.upstream_tag != ''
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || true
          git remote set-url --push upstream DISABLED || true
          git fetch upstream "main" --prune --no-tags
          git fetch origin "${BASE_BRANCH}" --prune --no-tags

          BEHIND=$(git rev-list --count "origin/${BASE_BRANCH}..upstream/main")
          if [ "$BEHIND" -eq 0 ]; then
            echo "main_ready=true" >> "$GITHUB_OUTPUT"
            echo "Fork ${BASE_BRANCH} is synced with upstream/main."
          else
            echo "main_ready=false" >> "$GITHUB_OUTPUT"
            echo "Fork ${BASE_BRANCH} is behind upstream/main by ${BEHIND} commit(s); skipping release align for now."
          fi

      - name: Exit if no upstream tag resolved
        if: steps.tag.outputs.upstream_tag == ''
        run: echo "Nothing to do."

      - name: Stop when fork main is not synced
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready != 'true'
        run: echo "Waiting for upstream sync to merge before mirroring release."

      - name: Skip if already mirrored
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true'
        id: mirrored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UP_TAG="${{ steps.tag.outputs.upstream_tag }}"
          if gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName --jq '.[].tagName' | grep -q "upstream-${UP_TAG}"; then
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
            echo "Already mirrored upstream tag $UP_TAG."
          else
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if already mirrored
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'false'
        run: echo "Release already mirrored."

      - name: Add upstream remote + fetch upstream tag (namespaced) + fetch fork base
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          UP_TAG="${{ steps.tag.outputs.upstream_tag }}"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || true
          git remote set-url --push upstream DISABLED || true

          git fetch origin "${BASE_BRANCH}" --prune --no-tags

          # Only fetch the needed tag into a namespaced local tag to avoid collisions
          git fetch upstream --no-tags "refs/tags/${UP_TAG}:refs/tags/upstream/${UP_TAG}" --prune

      - name: Create release-align branch from fork base (workflows already correct)
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          UP_TAG="${{ steps.tag.outputs.upstream_tag }}"
          SAFE_TAG=$(echo "$UP_TAG" | sed 's/[^A-Za-z0-9._-]/-/g')
          BR="automated/release-align-${SAFE_TAG}"

          git checkout -B "$BR" "origin/${BASE_BRANCH}"
          echo "BRANCH=$BR" >> "$GITHUB_ENV"

      - name: Overlay upstream tag snapshot onto branch (excluding fork-owned paths)
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          UP_TAG="${{ steps.tag.outputs.upstream_tag }}"

          # Bring upstream tag content in, but DO NOT touch fork-owned areas.
          # This keeps .github/workflows unchanged (avoids GitHub push rejection).
          git checkout "refs/tags/upstream/${UP_TAG}" -- \
            . \
            ':(exclude).github/workflows' \
            ':(exclude).github/prompts' \
            ':(exclude).github/instructions' \
            ':(exclude).github/agents' \
            ':(exclude)scripts'

          git add -A

          if git diff --cached --quiet; then
            echo "No upstream snapshot changes staged (unexpected)."
          else
            git commit -m "chore: align to upstream tag snapshot ${UP_TAG}" || true
          fi

      - name: Apply guard exemptions (globs+recursive; lenient)
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          # scripts/guard-exemptions.txt exists because we are based on fork main
          export BASE_BRANCH="${BASE_BRANCH}"
          export EXEMPTIONS_FILE="${EXEMPTIONS_FILE}"
          bash scripts/apply-guard-exemptions.sh

          if git diff --cached --quiet; then
            echo "No exemption changes staged."
          else
            git commit -m "chore: enforce fork-owned files (release align)" || true
          fi

      - name: Setup Node
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: npm ci

      - name: Regenerate prompts for release snapshot + verify
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        id: verify
        run: |
          set -euo pipefail
          rm -rf "${PROMPTS_DIR:?}/"* || true
          node scripts/generate-prompts.mjs 2>&1 | tee /tmp/generate.log
          set +e
          node scripts/verify-prompts.mjs 2>&1 | tee /tmp/verify.log
          VERIFY_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$VERIFY_EXIT" -eq 0 ]; then
            echo "verify_ok=true" >> "$GITHUB_OUTPUT"
            echo "Release snapshot prompt verification passed."
          else
            echo "verify_ok=false" >> "$GITHUB_OUTPUT"
            echo "Release snapshot prompt verification failed (exit $VERIFY_EXIT)."
          fi

      - name: Upload prompt logs on release verify failure
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true' && steps.verify.outputs.verify_ok == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-align-verify-logs
          path: |
            /tmp/generate.log
            /tmp/verify.log

      - name: Dispatch repair agent for release verify failure
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true' && steps.verify.outputs.verify_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run "${REPAIR_WORKFLOW}" \
            --repo "$GITHUB_REPOSITORY" \
            -f branch="${BRANCH}" \
            -f reason="release_verify_failed" \
            -f upstream_repo="${UPSTREAM_REPO}" \
            -f upstream_tag="${{ steps.tag.outputs.upstream_tag }}" \
            -f base_branch="${BASE_BRANCH}"
          echo "Repair agent dispatched. Worker exiting."
          exit 0

      - name: Commit release-aligned prompts
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          git add -A "${PROMPTS_DIR}" || true
          if git diff --cached --quiet; then
            echo "No prompt changes to commit (unexpected for release-align)."
          else
            git commit -m "chore: release-align prompts for ${{ steps.tag.outputs.upstream_tag }}" || true
          fi

      - name: Push release-align branch (with snapshot + prompts)
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        run: |
          set -euo pipefail
          git push -u origin "${BRANCH}" --force-with-lease

      - name: Create or update release-align PR
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="chore: release-align ${{ steps.tag.outputs.upstream_tag }}"
          BODY=$(cat <<EOF
          Automated release alignment for upstream tag `${{ steps.tag.outputs.upstream_tag }}`.

          - Upstream repo: ${UPSTREAM_REPO}
          - Upstream tag: ${{ steps.tag.outputs.upstream_tag }}
          - Base branch: ${BASE_BRANCH}
          - Includes upstream tag snapshot overlay, guard exemptions, and prompt regeneration/verification.
          EOF
          )

          PR_NUM=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "${BRANCH}" --base "${BASE_BRANCH}" --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "upstream-sync" \
              --label "automated"
            PR_NUM=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "${BRANCH}" --base "${BASE_BRANCH}" --json number --jq '.[0].number // empty')
          else
            gh pr edit "$PR_NUM" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY"
          fi

          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUM"

      - name: Enable auto-merge for release-align PR
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ steps.pr.outputs.pr_number }}"
          if [ -z "$PR" ]; then
            echo "No PR number available; skipping auto-merge."
            exit 0
          fi

          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --auto --merge --delete-branch=false || true
          STATE=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json mergeStateStatus --jq '.mergeStateStatus')
          if [ "$STATE" = "CLEAN" ]; then
            gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --merge --delete-branch=false || true
          fi

      - name: Check whether release-align PR merged
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true'
        id: pr_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ steps.pr.outputs.pr_number }}"
          if [ -z "$PR" ]; then
            echo "can_mirror=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MERGED_AT=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json mergedAt --jq '.mergedAt // empty')
          if [ -n "$MERGED_AT" ]; then
            echo "can_mirror=true" >> "$GITHUB_OUTPUT"
            echo "Release-align PR #$PR merged at $MERGED_AT."
          else
            echo "can_mirror=false" >> "$GITHUB_OUTPUT"
            echo "Release-align PR #$PR is not merged yet."
          fi

      - name: Dispatch repair agent if release-align PR did not merge
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true' && steps.pr_gate.outputs.can_mirror != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run "${REPAIR_WORKFLOW}" \
            --repo "$GITHUB_REPOSITORY" \
            -f branch="${BRANCH}" \
            -f reason="pr_merge_failed" \
            -f pr_number="${{ steps.pr.outputs.pr_number }}" \
            -f upstream_repo="${UPSTREAM_REPO}" \
            -f upstream_tag="${{ steps.tag.outputs.upstream_tag }}" \
            -f base_branch="${BASE_BRANCH}"
          echo "Repair agent dispatched for release-align PR merge."

      - name: Dispatch release-mirror-worker (creates fork tag + release w/ upstream notes)
        if: steps.tag.outputs.upstream_tag != '' && steps.sync.outputs.main_ready == 'true' && steps.mirrored.outputs.needs_mirror == 'true' && steps.pr_gate.outputs.can_mirror == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run "${MIRROR_WORKFLOW}" \
            --repo "$GITHUB_REPOSITORY" \
            -f upstream_repo="${UPSTREAM_REPO}" \
            -f upstream_tag="${{ steps.tag.outputs.upstream_tag }}" \
            -f target_ref="${BASE_BRANCH}" \
            -f force="false"
          echo "Dispatched release-mirror-worker."