name: release-mirror-worker

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Upstream repo, e.g. gsd-build/get-shit-done"
        required: true
        type: string
      upstream_tag:
        description: "Upstream tag to mirror, e.g. v2.1.0"
        required: true
        type: string
      target_ref:
        description: "Ref/branch to tag in the fork (default: main)"
        required: false
        default: "main"
        type: string
      force:
        description: "Force mirror (for auditing only)"
        required: false
        default: "false"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-mirror-worker
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Assert fork context (optional safety)
        run: |
          echo "Repo: $GITHUB_REPOSITORY"

      - name: Preflight safety + idempotency checks
        id: precheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ inputs.target_ref }}"
          FORCE="${{ inputs.force }}"
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"

          if [ "$FORCE" != "true" ] && [ "$REF" != "main" ]; then
            echo "Ref '${REF}' is not allowed unless force=true. Skipping mirror run."
            echo "should_mirror=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXISTING=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 400 --json tagName --jq '.[].tagName' | grep -E "upstream-${UPSTREAM_TAG}$" | head -n 1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Upstream tag ${UPSTREAM_TAG} already mirrored as ${EXISTING}; skipping."
            echo "should_mirror=false" >> "$GITHUB_OUTPUT"
            echo "existing_tag=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "should_mirror=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.should_mirror == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        if: steps.precheck.outputs.should_mirror == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout target ref
        if: steps.precheck.outputs.should_mirror == 'true'
        run: |
          set -euo pipefail
          REF="${{ inputs.target_ref }}"
          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune
          if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
            git checkout -B "${REF}" "origin/${REF}"
          else
            # allow tags/sha
            git checkout "${REF}" || true
          fi
          echo "Tagging ref: $(git rev-parse --short HEAD) (ref=${REF})"

      - name: Compute fork mirror tag
        if: steps.precheck.outputs.should_mirror == 'true'
        id: compute
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"

          # Determine next v0.0.X patch from fork latest release tag (lenient parse)
          FORK_LATEST=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name // empty' 2>/dev/null || true)
          if [ -z "$FORK_LATEST" ]; then
            NEXT_PATCH=1
          else
            if echo "$FORK_LATEST" | grep -Eq '^v0\.0\.[0-9]+'; then
              FORK_PATCH=$(echo "$FORK_LATEST" | sed -E 's/^v0\.0\.([0-9]+).*/\1/')
              NEXT_PATCH=$((FORK_PATCH + 1))
            else
              NEXT_PATCH=1
            fi
          fi

          NEW_TAG="v0.0.${NEXT_PATCH}-upstream-${UPSTREAM_TAG}"
          while gh release view "$NEW_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; do
            NEXT_PATCH=$((NEXT_PATCH + 1))
            NEW_TAG="v0.0.${NEXT_PATCH}-upstream-${UPSTREAM_TAG}"
          done

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New fork tag: $NEW_TAG"

      - name: Create and push tag (PAT required)
        if: steps.precheck.outputs.should_mirror == 'true'
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.compute.outputs.new_tag }}"
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"

          git remote set-url origin "https://x-access-token:${COPILOT_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "$NEW_TAG" -m "Mirror upstream release ${UPSTREAM_TAG}"
          git push origin "$NEW_TAG"

      - name: Build release notes (copy upstream body)
        if: steps.precheck.outputs.should_mirror == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          UPSTREAM_REPO="${{ inputs.upstream_repo }}"
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          NEW_TAG="${{ steps.compute.outputs.new_tag }}"

          UPSTREAM_BODY=$(gh api "repos/${UPSTREAM_REPO}/releases/tags/${UPSTREAM_TAG}" --jq '.body // empty' 2>/dev/null || true)
          if [ -z "$UPSTREAM_BODY" ]; then
            UPSTREAM_BODY="_Upstream release notes unavailable._"
          fi

          cat > /tmp/release-body.md << EOF
          ## Fork Mirror: ${NEW_TAG}

          | Field | Value |
          |---|---|
          | Fork tag | \`${NEW_TAG}\` |
          | Upstream release | \`${UPSTREAM_TAG}\` |
          | Upstream release URL | https://github.com/${UPSTREAM_REPO}/releases/tag/${UPSTREAM_TAG} |
          | Forced run | \`${{ inputs.force }}\` |

          ---
          ## Upstream Release Notes (${UPSTREAM_TAG})
          EOF

          printf '%s\n' "$UPSTREAM_BODY" >> /tmp/release-body.md

            
      - name: Create release (or skip if exists)
        if: steps.precheck.outputs.should_mirror == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.compute.outputs.new_tag }}"

          if gh release view "$NEW_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists."
          else
            gh release create "$NEW_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "GSD Copilot ${NEW_TAG}" \
              --notes-file /tmp/release-body.md
            echo "Created release $NEW_TAG."
          fi

      - name: Trigger zip build/upload (release.yml)
        if: steps.precheck.outputs.should_mirror == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.compute.outputs.new_tag }}"

          echo "Dispatching release.yml to package tag $NEW_TAG..."
          gh workflow run "release.yml" \
            --repo "$GITHUB_REPOSITORY" \
            -f tag="$NEW_TAG"

          echo "release.yml dispatched successfully for $NEW_TAG"

